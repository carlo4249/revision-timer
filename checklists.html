<style>
/* Page shell */
.cl-page { display:flex; flex-direction:column; height:100dvh; overflow:hidden; position:relative; z-index:1; }
.cl-head { flex-shrink:0; padding:max(env(safe-area-inset-top,0px),14px) 20px 0; }
.cl-scroll { flex:1; overflow-y:auto; overflow-x:hidden; padding:0 20px calc(env(safe-area-inset-bottom,0px) + 32px); -webkit-overflow-scrolling:touch; }
.cl-scroll::-webkit-scrollbar { width:3px; }
.cl-scroll::-webkit-scrollbar-thumb { background:var(--s3); border-radius:2px; }

/* Lock screen */
.lock-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100dvh; padding:32px 24px; text-align:center; gap:12px; }
.lock-icon { font-size:52px; margin-bottom:4px; }
.lock-title { font-size:22px; font-weight:800; letter-spacing:-.6px; }
.lock-sub { font-size:14px; color:var(--muted); line-height:1.6; max-width:260px; margin-bottom:8px; }
.lock-input { width:100%; max-width:320px; height:48px; padding:14px 15px; border-radius:var(--r); border:1.5px solid var(--border); outline:none; background:var(--s0); color:var(--text); font-family:inherit; font-size:16px; text-align:center; letter-spacing:2px; transition:border-color .2s; }
.lock-input:focus { border-color:rgba(16,152,247,.45); }
.lock-btn { width:100%; max-width:320px; padding:15px; margin-top:4px; background:linear-gradient(135deg,var(--acc),#0a7ad4); color:#fff; border:none; border-radius:var(--r-lg); font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .2s; }
.lock-btn:active { opacity:.85; }
.lock-err { font-size:13px; color:var(--red); min-height:20px; }
.lock-back { background:none; border:none; font-family:inherit; font-size:13px; color:var(--hint); cursor:pointer; padding:8px; transition:color .15s; margin-top:4px; }
.lock-back:hover { color:var(--muted); }

/* Header */
.cl-hdr { display:flex; align-items:center; justify-content:space-between; padding:4px 0 14px; gap:8px; }
.cl-back { background:none; border:1px solid var(--border); color:var(--muted); padding:7px 14px; border-radius:var(--r); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:5px; transition:background .15s,color .15s; flex-shrink:0; }
.cl-back:hover { background:var(--s2); color:var(--text); }

/* Subject pills */
.subj-scroll { overflow-x:auto; overflow-y:hidden; margin-bottom:10px; padding-bottom:3px; -webkit-overflow-scrolling:touch; }
.subj-scroll::-webkit-scrollbar { height:2px; }
.subj-scroll::-webkit-scrollbar-thumb { background:var(--s3); border-radius:2px; }
.subj-pills { display:flex; gap:6px; width:max-content; padding:2px 2px 4px; }
.subj-pill { padding:8px 16px; background:var(--s1); border:1px solid var(--border); border-radius:20px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; white-space:nowrap; transition:all .2s; user-select:none; }
.subj-pill:hover { background:var(--s2); }
.subj-pill.act { background:var(--acc); color:#fff; border-color:var(--acc); box-shadow:0 2px 8px rgba(16,152,247,.2); }

/* Paper tabs */
.paper-tabs { display:flex; gap:6px; margin-bottom:16px; }
.paper-tab { flex:1; padding:10px; background:var(--s1); border:1.5px solid var(--border); border-radius:var(--r); font-family:inherit; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; transition:all .2s; text-align:center; }
.paper-tab:hover { background:var(--s2); }
.paper-tab.act { background:var(--acc-l); border-color:rgba(16,152,247,.35); color:var(--acc-t); }

/* Progress badges */
.prog-row { display:flex; gap:7px; margin-bottom:14px; }
.prog-badge { flex:1; background:var(--s1); border:1px solid var(--border); border-radius:var(--r); padding:10px 8px; text-align:center; }
.prog-n { font-size:22px; font-weight:800; letter-spacing:-1px; line-height:1; }
.prog-lbl { font-size:9px; color:var(--hint); text-transform:uppercase; letter-spacing:.6px; margin-top:3px; }
.prog-n.red-n { color:#cc4038; }
.prog-n.amb-n { color:#be8816; }
.prog-n.grn-n { color:#3c7250; }
.prog-n.none-n { color:var(--hint); }

/* Progress bar */
.pg-bar-wrap { height:5px; background:var(--s2); border-radius:3px; margin-bottom:16px; overflow:hidden; display:flex; gap:1px; }
.pg-bar-seg { height:100%; transition:width .5s cubic-bezier(.22,.8,.3,1); }
.pg-seg-red { background:#cc4038; }
.pg-seg-amb { background:#be8816; }
.pg-seg-grn { background:#3c7250; }

/* Legend */
.cl-legend { display:flex; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
.cl-leg { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
.cl-leg-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

/* Exam board badge */
.exam-board-badge { display:inline-flex; align-items:center; background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:4px 10px; font-size:10px; font-weight:700; color:var(--muted); margin-bottom:14px; letter-spacing:.3px; }

/* Items */
.cl-item { display:flex; align-items:flex-start; gap:12px; padding:11px 14px; background:var(--s1); border-radius:var(--r); border:1px solid var(--border); margin-bottom:5px; cursor:pointer; transition:background .15s; user-select:none; }
.cl-item:hover { background:var(--s2); }
.cl-item:active { transform:scale(.99); }
.cl-dot { width:15px; height:15px; border-radius:50%; flex-shrink:0; border:2px solid var(--s3); margin-top:1px; transition:all .2s; }
.cl-dot.red   { background:#cc4038; border-color:#cc4038; }
.cl-dot.amber { background:#be8816; border-color:#be8816; }
.cl-dot.green { background:#3c7250; border-color:#3c7250; }
.cl-txt { font-size:12px; color:var(--text); flex:1; line-height:1.65; }
.cl-txt.higher { color:var(--acc-t); }
.cl-txt.core   { color:var(--log); }

/* Desktop */
@media(min-width:1024px) {
  .cl-page { width:var(--card-w); max-width:var(--card-w); margin:0 auto; }
}
</style>
</head>

<div class="desktop-card"></div>

<!-- Lock screen -->
<div id="lock-screen" class="lock-screen">

  <div class="lock-err" id="lock-err"></div>
  <button class="lock-btn" onclick="tryUnlock()">Unlock</button>
  <button class="lock-back" onclick="window.location.href='resources.html'">&#8592; Back to Solus</button>
</div>

<!-- Main page (hidden until unlocked) -->
<div id="cl-page" class="cl-page" style="display:none">
  <div class="cl-head">
    <div class="cl-hdr">
      <button class="cl-back" onclick="window.location.href='resources.html'">&#8592; Solus</button>

      <button class="cl-back" onclick="confirmReset()" style="color:var(--hint);font-size:11px">Reset</button>
    </div>
    <div class="subj-scroll"><div class="subj-pills" id="subj-pills"></div></div>
    <div class="paper-tabs" id="paper-tabs"></div>
  </div>

  <div class="cl-scroll">
    <div id="board-badge"></div>
    <div class="prog-row">
      <div class="prog-badge"><div class="prog-n red-n"  id="pr-red">0</div><div class="prog-lbl">Red</div></div>
      <div class="prog-badge"><div class="prog-n amb-n"  id="pr-amb">0</div><div class="prog-lbl">Amber</div></div>
      <div class="prog-badge"><div class="prog-n grn-n"  id="pr-grn">0</div><div class="prog-lbl">Green</div></div>
      <div class="prog-badge"><div class="prog-n none-n" id="pr-none">0</div><div class="prog-lbl">Unrated</div></div>
    </div>
    <div class="pg-bar-wrap">
      <div class="pg-bar-seg pg-seg-red" id="seg-red" style="width:0%"></div>
      <div class="pg-bar-seg pg-seg-amb" id="seg-amb" style="width:0%"></div>
      <div class="pg-bar-seg pg-seg-grn" id="seg-grn" style="width:0%"></div>
    </div>
    <div class="cl-legend">
      <div class="cl-leg"><div class="cl-leg-dot" style="background:var(--s3)"></div>Tap once: Red</div>
      <div class="cl-leg"><div class="cl-leg-dot" style="background:#cc4038"></div>Tap again: Amber</div>
      <div class="cl-leg"><div class="cl-leg-dot" style="background:#be8816"></div>Tap again: Green</div>
      <div class="cl-leg"><div class="cl-leg-dot" style="background:#3c7250"></div>Tap again: Reset</div>
    </div>
    <div id="cl-list"></div>
    <div style="height:8px"></div>
  </div>
</div>

<!-- Confirm overlay -->
<div class="overlay" id="confirm-ov" onclick="if(event.target===this)closeConfirm()" style="z-index:260">
  <div class="sheet"><div class="sheet-handle"></div><div class="sheet-title" id="confirm-title">Are you sure?</div><div class="sheet-body" id="confirm-body"></div><div class="sheet-btns"><button class="btn btn-danger" id="confirm-ok" onclick="doConfirm()">Confirm</button><button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button></div></div>
</div>

// ── State ─────────────────────────────────────────────────
let curSubj  = 'Biology';
let curPaper = Object.keys(CHECKLISTS.Biology.papers)[0];
let conf     = {};
let confirmCb = null;

// ── Theme ─────────────────────────────────────────────────
function applyTheme() {
  let t = 'dark';
  try { t = localStorage.getItem('rv_theme') || 'dark'; } catch(e) {}
  document.documentElement.setAttribute('data-theme', t);
  const m = document.getElementById('tcm');
  if (m) m.content = t === 'dark' ? '#0e1010' : '#f2f2ed';
}

// ── Lock ──────────────────────────────────────────────────
function tryUnlock() {
  const pw = document.getElementById('lock-pw');
  const err = document.getElementById('lock-err');
  if (!pw) return;
  if (pw.value === ADMIN_PW) {
    try { sessionStorage.setItem('sv_admin', '1'); } catch(e) {}
    pw.value = '';
    showApp();
  } else {
    if (err) err.textContent = 'Incorrect password';
    pw.value = '';
    pw.style.animation = 'none';
    requestAnimationFrame(() => { pw.style.animation = 'shake .3s ease'; });
    setTimeout(() => { if (err) err.textContent = ''; }, 2000);
  }
}

function showApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('cl-page').style.display = 'flex';
  loadConf();
  buildSubjPills();
  render();
}

// ── Persistence ───────────────────────────────────────────
function loadConf() {
  try { conf = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e) { conf = {}; }
}
function saveConf() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(conf)); } catch(e) {}
}

// ── Subject pills ─────────────────────────────────────────
function buildSubjPills() {
  const wrap = document.getElementById('subj-pills');
  if (!wrap) return;
  wrap.innerHTML = Object.keys(CHECKLISTS).map(s =>
    `<div class="subj-pill${s === curSubj ? ' act' : ''}" onclick="switchSubj('${s}')">${s}</div>`
  ).join('');
}
function switchSubj(s) {
  curSubj  = s;
  curPaper = Object.keys(CHECKLISTS[s].papers)[0];
  buildSubjPills();
  render();
}

// ── Render ────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const data   = CHECKLISTS[curSubj];
  const papers = Object.keys(data.papers);

  // Paper tabs
  const pt = document.getElementById('paper-tabs');
  if (pt) pt.innerHTML = papers.map(p =>
    `<button class="paper-tab${p === curPaper ? ' act' : ''}" onclick="switchPaper(this,'${esc(p)}')">${p}</button>`
  ).join('');

  // Board badge
  const bb = document.getElementById('board-badge');
  if (bb) bb.innerHTML = `<div class="exam-board-badge">${esc(data.examBoard)}</div>`;

  const items    = data.papers[curPaper] || [];
  const confKey  = `${curSubj}::${curPaper}`;
  const itemConf = conf[confKey] || {};

  // Counts
  let red = 0, amb = 0, grn = 0, none = 0;
  items.forEach((_, i) => {
    const c = itemConf[i] || '';
    if      (c === 'red')   red++;
    else if (c === 'amber') amb++;
    else if (c === 'green') grn++;
    else                    none++;
  });
  const total = items.length;
  document.getElementById('pr-red').textContent  = red;
  document.getElementById('pr-amb').textContent  = amb;
  document.getElementById('pr-grn').textContent  = grn;
  document.getElementById('pr-none').textContent = none;

  const pct = v => total > 0 ? (v / total * 100).toFixed(1) + '%' : '0%';
  document.getElementById('seg-red').style.width = pct(red);
  document.getElementById('seg-amb').style.width = pct(amb);
  document.getElementById('seg-grn').style.width = pct(grn);

  // Items
  const list = document.getElementById('cl-list');
  if (!list) return;
  list.innerHTML = items.map((txt, i) => {
    const c   = itemConf[i] || '';
    const isH = txt.includes('(HIGHER)') || txt.includes('(HT)') || txt.includes('Phy only)');
    const isC = txt.toLowerCase().startsWith('core practical');
    const cls = isH ? 'higher' : isC ? 'core' : '';
    const display = txt
      .replace(' (HIGHER)', ' \u2605')
      .replace(' (HT)', ' \u2605')
      .replace('(HIGHER)', ' \u2605');
    return `<div class="cl-item" onclick="cycleItem('${esc(confKey)}',${i},this)">
      <div class="cl-dot${c ? ' '+c : ''}"></div>
      <div class="cl-txt${cls ? ' '+cls : ''}">${esc(display)}</div>
    </div>`;
  }).join('');
}

function switchPaper(btn, p) {
  curPaper = p;
  document.querySelectorAll('.paper-tab').forEach(b => b.classList.remove('act'));
  btn.classList.add('act');
  render();
}

function cycleItem(confKey, idx, el) {
  if (!conf[confKey]) conf[confKey] = {};
  const cur  = conf[confKey][idx] || '';
  const next = { '':'red', 'red':'amber', 'amber':'green', 'green':'' }[cur];
  if (next) conf[confKey][idx] = next; else delete conf[confKey][idx];
  saveConf();
  const dot = el.querySelector('.cl-dot');
  if (dot) dot.className = 'cl-dot' + (next ? ' '+next : '');
  updateCounts(confKey);
}

function updateCounts(confKey) {
  const items    = CHECKLISTS[curSubj].papers[curPaper] || [];
  const itemConf = conf[confKey] || {};
  let red=0, amb=0, grn=0, none=0;
  items.forEach((_, i) => {
    const c = itemConf[i] || '';
    if      (c==='red')   red++;
    else if (c==='amber') amb++;
    else if (c==='green') grn++;
    else                  none++;
  });
  const total = items.length;
  document.getElementById('pr-red').textContent  = red;
  document.getElementById('pr-amb').textContent  = amb;
  document.getElementById('pr-grn').textContent  = grn;
  document.getElementById('pr-none').textContent = none;
  const pct = v => total > 0 ? (v / total * 100).toFixed(1) + '%' : '0%';
  document.getElementById('seg-red').style.width = pct(red);
  document.getElementById('seg-amb').style.width = pct(amb);
  document.getElementById('seg-grn').style.width = pct(grn);
}

// ── Reset ─────────────────────────────────────────────────
function confirmReset() {
  openConfirm('Reset all checklists?', 'This will clear all RAG ratings for every subject and paper. This cannot be undone.',
    () => { conf = {}; saveConf(); render(); });
}
function openConfirm(title, body, cb) {
  confirmCb = cb;
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent  = body;
  document.getElementById('confirm-ov').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-ov').classList.remove('open'); confirmCb = null; }
function doConfirm()    { const cb = confirmCb; closeConfirm(); if (cb) cb(); }

// ── Init ──────────────────────────────────────────────────
applyTheme();
let admin = false;
try { admin = sessionStorage.getItem('sv_admin') === '1'; } catch(e) {}
if (admin) { showApp(); }
